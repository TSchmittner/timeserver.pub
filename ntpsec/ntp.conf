#=============================================================================
# NTP Configuration (ntpsec)
# /etc/ntpsec/ntp.conf
# https://gitlab.thomas-schmittner.de/tschmittner/timeserver_pub/-/raw/main/ntp.conf
# https://codeberg.org/tschmittner/timeserver_pub/raw/branch/main/ntp.conf
# https://raw.githubusercontent.com/TSchmittner/timeserver.pub/main/ntp.conf
#=============================================================================

# --- Primary Server (DE) ----------------------------------------------------
server de.timeserver.pub iburst prefer

# --- Secondary Servers (US) -------------------------------------------------
server us.timeserver.pub  iburst
server us2.timeserver.pub iburst
# --- Secondary Servers (SG) -------------------------------------------------
server sg.timeserver.pub iburst

# --- Public Pool (external fallback if servers are unreachable) -------------
pool 1.pool.ntp.org iburst
pool 2.pool.ntp.org iburst

# --- Local Fallback (last resort) -------------------------------------------
server 127.127.1.0
fudge  127.127.1.0 stratum 10

# --- Access Control ---------------------------------------------------------
restrict default kod nomodify notrap nopeer noquery
restrict -6 default kod nomodify notrap nopeer noquery
restrict 127.0.0.1
restrict ::1

# --- Drift File ---------------------------------------------------------
driftfile /var/lib/ntpsec/ntp.drift

# --- Statistics Logging -----------------------------------------------------
statsdir /var/log/ntpsec/
statistics loopstats peerstats clockstats
filegen loopstats  file loopstats  type day link enable
filegen peerstats  file peerstats  type day link enable
filegen clockstats file clockstats type day link enable

# --- Leap Seconds (optional, falls Datei vorhanden) -------------------------
# leapfile /usr/share/zoneinfo/leap-seconds.list
