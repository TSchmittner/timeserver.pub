#=============================================================================
# NTP Configuration (chrony)
# /etc/chrony/chrony.conf
# https://gitlab.thomas-schmittner.de/tschmittner/timeserver_pub/-/raw/main/chrony/crony.conf
# https://codeberg.org/tschmittner/timeserver_pub/blame/branch/main/chrony/crony.conf
# https://raw.githubusercontent.com/TSchmittner/timeserver.pub/main/chrony/crony.conf
#=============================================================================

# --- Primary Server (DE) ----------------------------------------------------
server de.timeserver.pub iburst prefer

# --- Secondary Servers (US) -------------------------------------------------
server us.timeserver.pub  iburst
server us2.timeserver.pub iburst
# --- Secondary Servers (SG) -------------------------------------------------
server sg.timeserver.pub iburst

# --- Public Pool (external fallback if servers are unreachable) -------------
pool 1.pool.ntp.org iburst
pool 2.pool.ntp.org iburst

# --- Local Fallback (last resort) -------------------------------------------
local stratum 10 orphan

# --- Access Control ---------------------------------------------------------
# chrony verweigert Clients standardmäßig den Zugriff, "allow" ist nötig
allow 127.0.0.1
allow ::1
# Falls das Gerät auch im lokalen Netz Zeit anbieten soll, hier ergänzen, z.B.:
# allow 192.168.0.0/16

# --- Drift File ---------------------------------------------------------
driftfile /var/lib/chrony/chrony.drift

# --- Statistics Logging -----------------------------------------------------
logdir /var/log/chrony
log measurements statistics tracking

# --- Empfohlene chrony-Standardoptionen -------------------------------------
rtcsync
makestep 1.0 3
